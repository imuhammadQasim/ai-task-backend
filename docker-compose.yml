services:
  postgres:
    image: postgres:16
    container_name: task_agent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: task_agent_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
